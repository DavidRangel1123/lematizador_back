services:
  lematizador:
    build: .
    container_name: lematizador
    ports:
      - "8010:8000" # Expone el puerto 8010 del host al 8000 del contenedor
    networks:
      - lematizador_net
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: >
      sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  lematizador_net:
    driver: bridge
